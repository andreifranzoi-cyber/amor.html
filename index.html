<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pra Gabriela ❤️</title>

<style>
    body {
        margin: 0;
        background: linear-gradient(135deg, #0f0f1a, #1a0f1f);
        color: white;
        font-family: Arial;
        text-align: center;
        padding: 80px 20px;
    }

    h1 {
        color: #ff4d6d;
    }

    .btn {
        background: #ff4d6d;
        border: none;
        padding: 15px 25px;
        color: white;
        font-size: 18px;
        border-radius: 10px;
        margin-top: 30px;
    }

    .msg {
        display: none;
        margin-top: 30px;
        font-size: 20px;
        background: rgba(255,255,255,0.08);
        padding: 20px;
        border-radius: 15px;
    }

    .assinatura {
        margin-top: 40px;
        color: #ff4d6d;
    }
</style>
</head>

<body>

<h1>💖 Gabriela</h1>

<button class="btn" onclick="mostrar()">Clique aqui ❤️</button>

<div class="msg" id="msg">
    Gabriela, você é meio peidona às vezes 😂<br><br>
    mas mesmo assim… eu te amo muito ❤️
</div>

<div class="assinatura">
    — Andrei
</div>

<script>
function mostrar() {
    document.getElementById("msg").style.display = "block";
}
</script>

</body>
</html>
