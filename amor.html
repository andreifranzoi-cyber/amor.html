<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Pra Gabriela ❤️</title>

    <style>
        body {
            margin: 0;
            background: linear-gradient(135deg, #0f0f1a, #1a0f1f);
            color: white;
            font-family: Arial;
            text-align: center;
            padding: 70px 20px;
        }

        .heart {
            font-size: 70px;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.4); }
            100% { transform: scale(1); }
        }

        h1 {
            color: #ff4d6d;
            font-size: 34px;
            margin-top: 20px;
        }

        .card {
            margin-top: 30px;
            background: rgba(255,255,255,0.08);
            padding: 25px;
            border-radius: 15px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        p {
            font-size: 18px;
            line-height: 1.6;
        }

        .nome {
            color: #ff4d6d;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="heart">❤️</div>

    <h1>Para <span class="nome">Gabriela</span></h1>

    <div class="card">
        <p>
            Gabriela,<br><br>

            Eu não sei como explicar direito, mas você mudou muita coisa em mim.<br><br>

            Tudo ficou mais leve, mais bonito e mais com sentido desde que você apareceu.<br><br>

            Eu só queria te lembrar que você é especial demais pra mim ❤️
        </p>
    </div>

    <p style="margin-top:40px; color:#ff4d6d;">
        Eu gosto muito de você, Gabriela ❤️
    </p>

</body>
</html>
